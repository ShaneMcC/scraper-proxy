version: 2
updates:
- package-ecosystem: npm
  directory: /
  schedule:
    interval: daily
  open-pull-requests-limit: 10
  cooldown:
    default-days: 32 # Slightly over 1 month
  groups:
    npm-minor-patch:
      update-types:
      - minor
      - patch
    npm-major:
      update-types:
      - major
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: daily
  open-pull-requests-limit: 10
  cooldown:
    default-days: 32 # Slightly over 1 month
  groups:
    github-actions-all:
      patterns:
      - '*'
